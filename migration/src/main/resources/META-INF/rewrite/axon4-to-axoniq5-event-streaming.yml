# Axoniq event streaming (`io.axoniq.framework:axoniq-event-streaming`):
# placeholder. Consolidates `MultiStreamableMessageSource` (available since
# Axon Framework 4.2) into a dedicated Axoniq Framework 5 module.

---
type: specs.openrewrite.org/v1beta/recipe
name: io.axoniq.framework.migration.Axon4ToAxoniq5EventStreaming
displayName: Migrate to Axoniq event streaming (placeholder)
description: >-
  Placeholder. The Axoniq event streaming module
  (`io.axoniq.framework:axoniq-event-streaming`) consolidates multi-stream
  event consumption that lived in `MultiStreamableMessageSource` (available
  since Axon Framework 4.2) into a dedicated module in Axoniq Framework 5.
  AF4 applications using `MultiStreamableMessageSource` should migrate to
  `axoniq-event-streaming` once they adopt Axoniq Framework 5; this recipe
  will gain class-level mappings as that migration becomes deterministic.
