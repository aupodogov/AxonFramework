# Distributed messaging — moved into the Axoniq commercial offering
# (`io.axoniq.framework:axoniq-distributed-messaging`).
#
# Only the actual distributed-bus types move to Axoniq commercial. Helper
# types like `CommandDispatchException`, `RoutingStrategy`,
# `MetadataRoutingStrategy`, `UnresolvedRoutingKeyPolicy`, and
# `AnnotationRoutingStrategy` remain in open-source AF5 — those moves are
# handled by `Axon4ToAxon5Messaging`.

---
type: specs.openrewrite.org/v1beta/recipe
name: io.axoniq.framework.migration.Axon4ToAxoniq5DistributedMessaging
displayName: Migrate distributed messaging components to Axoniq Framework 5
description: >-
  Relocates the distributed command-bus components (DistributedCommandBus,
  CommandBusConnector) from the AF4 open-source `axon-messaging` module
  into the Axoniq commercial `axoniq-distributed-messaging` module
  (`io.axoniq.framework.messaging.commandhandling.distributed`).
  Each AF4 fully-qualified name is mapped directly to its final Axoniq
  location, so this recipe is order-independent relative to the open-source
  messaging package rename.
recipeList:
  # ── DistributedCommandBus ───────────────────────────────────────────────
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.commandhandling.distributed.DistributedCommandBus
      newFullyQualifiedTypeName: io.axoniq.framework.messaging.commandhandling.distributed.DistributedCommandBus
  # Also handle the post-OSS-rename intermediate state.
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.messaging.commandhandling.distributed.DistributedCommandBus
      newFullyQualifiedTypeName: io.axoniq.framework.messaging.commandhandling.distributed.DistributedCommandBus

  # ── CommandBusConnector ─────────────────────────────────────────────────
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.commandhandling.distributed.CommandBusConnector
      newFullyQualifiedTypeName: io.axoniq.framework.messaging.commandhandling.distributed.CommandBusConnector
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.axonframework.messaging.commandhandling.distributed.CommandBusConnector
      newFullyQualifiedTypeName: io.axoniq.framework.messaging.commandhandling.distributed.CommandBusConnector

  # Build-tool dep add: pull in the Axoniq distributed-messaging jar when
  # DistributedCommandBus is in use. Unified recipe covers both Maven and Gradle.
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: io.axoniq.framework
      artifactId: axoniq-distributed-messaging
      version: latest.release
      onlyIfUsing: io.axoniq.framework.messaging.commandhandling.distributed.DistributedCommandBus
