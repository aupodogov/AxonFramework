# Micrometer Metrics extension: AF4 `axon-micrometer` → AF5 `axon-metrics-micrometer`.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5MetricsMicrometerExtension
displayName: Migrate the Micrometer Metrics extension to Axon Framework 5
description: >-
  Relocates `org.axonframework.micrometer` to
  `org.axonframework.extension.metrics.micrometer`, reflecting the move into
  the per-provider `extension.metrics.*` layout.
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.axonframework.micrometer
      newPackageName: org.axonframework.extension.metrics.micrometer
      recursive: true
  # Build-tool coordinate move: org.axonframework:axon-micrometer →
  # org.axonframework.extensions.metrics:axon-metrics-micrometer. The unified
  # `java.dependencies.ChangeDependency` recipe applies to both Maven and Gradle.
  # `newVersion` is set inline so the rename and version bump happen atomically;
  # without it, ChangeDependency would validate the renamed coordinate against
  # the pre-bump AF4 version (which doesn't exist at the new groupId).
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: org.axonframework
      oldArtifactId: axon-micrometer
      newGroupId: org.axonframework.extensions.metrics
      newArtifactId: axon-metrics-micrometer
      newVersion: 5.1.0
