# Spring Cloud extension (axon-springcloud): placeholder. Distributed command
# bus functionality has moved into AxonIQ commercial in AF5.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5SpringCloudExtension
displayName: Migrate the Spring Cloud extension to Axon Framework 5 (placeholder)
description: >-
  Placeholder for the Spring Cloud extension migration. The Spring Cloud
  extension at `org.axonframework.extensions.springcloud` provided
  distributed command bus routing in AF4. In Axon Framework 5 the distributed
  command bus has moved into the AxonIQ commercial offering
  (`io.axoniq.framework:axoniq-distributed-messaging`). Code using
  `SpringCloudCommandRouter` must be replaced with the AxonIQ commercial
  distributed messaging APIs.
