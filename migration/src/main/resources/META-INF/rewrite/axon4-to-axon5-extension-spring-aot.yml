# Spring AOT extension: AF4 `org.axonframework.extensions.spring-aot:axon-spring-aot`
# has no Axon Framework 5 port. Drop the dependency so the project builds. If
# native-image / AOT support against AF5 is needed, that surface area must be
# re-evaluated manually — there is no drop-in replacement.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5SpringAotExtension
displayName: Remove the unported axon-spring-aot extension
description: >-
  The `org.axonframework.extensions.spring-aot:axon-spring-aot` extension has
  no Axon Framework 5 port. Removes the dependency so the project compiles
  against AF5. Projects that need Spring AOT / native-image support against
  AF5 must reintroduce equivalent functionality manually — there is no
  drop-in replacement.
recipeList:
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: org.axonframework.extensions.spring-aot
      artifactId: axon-spring-aot
