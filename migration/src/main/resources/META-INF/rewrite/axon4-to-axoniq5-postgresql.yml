# Axoniq PostgreSQL connector (`io.axoniq.framework:axoniq-postgresql`):
# placeholder. This is a new Axoniq Framework 5 module providing a
# PostgreSQL-tailored event store. It has no Axon Framework 4 counterpart —
# AF4 used the generic JDBC/JPA event-store engines for PostgreSQL.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxoniq5Postgresql
displayName: Migrate to the Axoniq PostgreSQL connector (placeholder)
description: >-
  Placeholder. The Axoniq PostgreSQL connector
  (`io.axoniq.framework:axoniq-postgresql`,
  `io.axoniq.framework.postgresql.*`) is new in Axoniq Framework 5 and has
  no Axon Framework 4 equivalent. Applications running on PostgreSQL with
  AF4 used the generic `JpaEventStorageEngine` or `JdbcEventStorageEngine`;
  switching to `axoniq-postgresql` is a configuration change rather than a
  rename and must be performed manually.
recipeList: []
