# Dropwizard Metrics extension: AF4 `axon-metrics` → AF5 `axon-metrics-dropwizard`.

---
type: specs.openrewrite.org/v1beta/recipe
name: org.axonframework.migration.Axon4ToAxon5MetricsDropwizardExtension
displayName: Migrate the Dropwizard Metrics extension to Axon Framework 5
description: >-
  Relocates `org.axonframework.metrics` to
  `org.axonframework.extension.metrics.dropwizard`, reflecting the move from a
  flat `metrics` namespace to a per-provider layout under
  `extension.metrics.*`.
recipeList:
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.axonframework.metrics
      newPackageName: org.axonframework.extension.metrics.dropwizard
      recursive: true
  # Build-tool coordinate move: org.axonframework:axon-metrics →
  # org.axonframework.extensions.metrics:axon-metrics-dropwizard. The unified
  # `java.dependencies.ChangeDependency` recipe applies to both Maven and Gradle.
  # `newVersion` is set inline so the rename and version bump happen atomically;
  # without it, ChangeDependency would validate the renamed coordinate against
  # the pre-bump AF4 version (which doesn't exist at the new groupId).
  - org.openrewrite.java.dependencies.ChangeDependency:
      oldGroupId: org.axonframework
      oldArtifactId: axon-metrics
      newGroupId: org.axonframework.extensions.metrics
      newArtifactId: axon-metrics-dropwizard
      newVersion: ${project.version}
