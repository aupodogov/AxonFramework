# Filtered at build time by the migration POM's <testResources> section.
# Mirrors the values injected into the filtered recipe YAMLs so recipe tests
# can assert against the same migration targets the recipes will produce.
# Defined in exactly one place each:
#   - axon.version    -> derived from the root POM's <revision> (Axon Framework 5 free target)
#   - axoniq.version  -> the migration POM's <axoniq.version>   (Axoniq Framework 5 commercial target)
axon.version=${project.version}
axoniq.version=${axoniq.version}
